source: economic_survey
description: >
  Economic Survey of India 2024-25 — chapter PDFs from indiabudget.gov.in.
  The Economic Survey is presented to Parliament before the Union Budget
  and is the canonical reference for UPSC GS-III Economy + Indian
  Economic Development questions.

